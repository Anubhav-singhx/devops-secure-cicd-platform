apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: staging
type: Opaque
stringData:
  JWT_SECRET: kubernetes-jwt-secret-production-value
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: staging
data:
  NODE_ENV: "production"
  PORT: "3001"
  DB_HOST: "postgres-service"   
  DB_PORT: "5432"
  DB_NAME: "taskmanager"
  DB_USER: "postgres"
  FRONTEND_URL: "http://localhost:3000"
  APP_VERSION: "1.0.0"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: staging
  labels:
    app: backend
    tier: api
spec:
  replicas: 2    
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1      
      maxUnavailable: 0  
  template:
    metadata:
      labels:
        app: backend
        tier: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          image: task-manager-backend:local
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: staging
spec:
  selector:
    app: backend
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP