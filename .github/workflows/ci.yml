name: 🔍 CI — Test, Scan & Build

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: "20"

jobs:
  code-quality:
    name: 📋 Code Quality & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: app/backend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd app/backend
          npm ci

      - name: Run tests with coverage
        run: |
          cd app/backend
          npm test
        env:
          NODE_ENV: test

      - name: SonarCloud Analysis
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  secret-scan:
    name: 🔐 Secret Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  dependency-scan:
    name: 📦 Dependency Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Scan backend dependencies
        run: |
          cd app/backend
          npm ci
          npm audit --audit-level=high || echo "⚠️ High vulnerabilities found - review needed"

      - name: Scan frontend dependencies
        run: |
          cd app/frontend
          npm ci
          npm audit --audit-level=high || echo "⚠️ High vulnerabilities found - review needed"

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          format: "sarif"
          output: "trivy-fs.sarif"

      - name: Upload scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4   # ✅ upgraded from v3
        with:
          sarif_file: "trivy-fs.sarif"

  codeql:
    name: 🔬 CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  build-and-scan:
    name: 🐳 Build & Container Security Scan
    runs-on: ubuntu-latest
    needs: [code-quality, secret-scan]
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Fix: GHCR requires all-lowercase image names
      # github.repository can contain uppercase letters which causes parse errors
      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LOWER=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Generate backend image metadata
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/backend   # ✅ lowercase
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/backend:latest   # ✅ lowercase
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          format: "sarif"
          output: "backend-trivy.sarif"

      - name: Upload backend scan to GitHub Security
        uses: github/codeql-action/upload-sarif@v4   # ✅ upgraded from v3
        with:
          sarif_file: "backend-trivy.sarif"

      - name: Generate frontend image metadata
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/frontend   # ✅ lowercase
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/frontend:latest   # ✅ lowercase
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          format: "table"

  infra-scan:
    name: 🏗️ Infrastructure Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan Kubernetes manifests
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "infra/kubernetes"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "0"
          format: "table"

      - name: Scan Terraform configs
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "infra/terraform"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "0"
          format: "table"

  ci-complete:
    name: ✅ CI Complete
    runs-on: ubuntu-latest
    needs:
      [code-quality, secret-scan, dependency-scan, build-and-scan, infra-scan]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "Code Quality: ${{ needs.code-quality.result }}"
          echo "Secret Scan: ${{ needs.secret-scan.result }}"
          echo "Dependency Scan: ${{ needs.dependency-scan.result }}"
          echo "Build & Scan: ${{ needs.build-and-scan.result }}"
          echo "Infra Scan: ${{ needs.infra-scan.result }}"

          if [[ "${{ needs.code-quality.result }}" == "failure" ]] || \
             [[ "${{ needs.secret-scan.result }}" == "failure" ]] || \
             [[ "${{ needs.build-and-scan.result }}" == "failure" ]]; then
            echo "❌ Critical jobs failed!"
            exit 1
          fi

          echo "✅ All critical CI checks passed!"

      - name: Create Job Summary
        run: |
          echo "## 🚀 CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality & Tests | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Detection | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Container Scan | ${{ needs.build-and-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Infrastructure Scan | ${{ needs.infra-scan.result }} |" >> $GITHUB_STEP_SUMMARY
