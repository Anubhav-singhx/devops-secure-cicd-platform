name: 🏆 CD — Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. sha-abc1234)'
        required: true
        default: 'latest'
      confirm:
        description: 'Type DEPLOY to confirm production deployment'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate:
    name: 🔒 Validate Production Request
    runs-on: ubuntu-latest

    steps:
      - name: Verify confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "❌ Production deployment requires typing 'DEPLOY' to confirm."
            echo "   You typed: '${{ github.event.inputs.confirm }}'"
            exit 1
          fi
          echo "✅ Production deployment confirmed by ${{ github.actor }}"

  deploy-production:
    name: 🏆 Deploy to Production
    runs-on: ubuntu-latest
    needs: [validate]
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Production deployment
        run: |
          echo "🏆 Deploying to production..."
          echo "Image tag: ${{ github.event.inputs.image_tag }}"
          echo "Deployer: ${{ github.actor }}"
          echo ""
          echo "In a real setup, this would run:"
          echo "kubectl set image deployment/backend backend=ghcr.io/.../backend:${{ github.event.inputs.image_tag }} -n production"
          echo "kubectl set image deployment/frontend frontend=ghcr.io/.../frontend:${{ github.event.inputs.image_tag }} -n production"
          echo "kubectl rollout status deployment/backend -n production"
          echo "kubectl rollout status deployment/frontend -n production"
          echo ""
          echo "✅ Production deployment complete!"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Release v${{ github.run_number }}"
          body: |
            ## 🚀 Production Deployment

            | Field | Value |
            |-------|-------|
            | Image Tag | `${{ github.event.inputs.image_tag }}` |
            | Deployed by | ${{ github.actor }} |
            | Commit | ${{ github.sha }} |
            | Date | ${{ github.event.head_commit.timestamp }} |

            ### Changes
            ${{ github.event.head_commit.message }}
          draft: false
